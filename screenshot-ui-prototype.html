<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>截图工具 · 全新界面设计原型</title>
<style>
/* ============ 设计令牌 ============ */
:root[data-theme="dark"]{
  --bg-canvas:#0f0f1a; --bg-app:#141422; --bg-card:#1e1e32; --bg-elev:#282844;
  --bg-hover:#333358; --bg-input:#181828;
  --accent:#4a8cff; --accent-2:#5c9cff; --accent-bg:#1a2848;
  --txt-0:#f0f0f8; --txt-1:#b0b0c8; --txt-2:#707088; --txt-3:#505068;
  --bd:#2a2a44; --bd-2:#3a3a58; --bd-accent:#4a8cff;
  --red:#e05555; --green:#4caf84; --orange:#e09050;
  --shadow:0 8px 32px rgba(0,0,0,.4); --ring:0 0 0 3px rgba(74,140,255,.18);
  --sel-fill:rgba(74,140,255,.06);
}
:root[data-theme="light"]{
  --bg-canvas:#f8f9fb; --bg-app:#ffffff; --bg-card:#ffffff; --bg-elev:#f4f6f9;
  --bg-hover:#eef1f6; --bg-input:#ffffff;
  --accent:#2e6fe0; --accent-2:#4a8cff; --accent-bg:#eaf1fe;
  --txt-0:#1a2233; --txt-1:#4a5568; --txt-2:#8a94a6; --txt-3:#b0b8c4;
  --bd:#e4e7ec; --bd-2:#d3d8df; --bd-accent:#2e6fe0;
  --red:#e05555; --green:#2fa86c; --orange:#e09050;
  --shadow:0 8px 24px rgba(20,30,60,.1); --ring:0 0 0 3px rgba(46,111,224,.16);
  --sel-fill:rgba(46,111,224,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Microsoft YaHei","Segoe UI",system-ui,sans-serif;
  background:var(--bg-canvas); color:var(--txt-0);
  font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
  transition:background .25s ease,color .25s ease;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--bd-2);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

/* ============ 主布局 ============ */
.app{display:flex;flex-direction:column;height:100vh;max-width:1320px;margin:0 auto;padding:16px;gap:14px}

/* 顶栏 */
.topbar{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:16px}
.brand .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#7f77dd);display:flex;align-items:center;justify-content:center}
.mode-tabs{display:flex;gap:4px;background:var(--bg-card);border:1px solid var(--bd);border-radius:10px;padding:4px}
.mode-tab{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:7px;color:var(--txt-1);font-size:13px;font-weight:500;transition:all .15s}
.mode-tab:hover{background:var(--bg-hover);color:var(--txt-0)}
.mode-tab.active{background:var(--accent);color:#fff}
.mode-tab svg{width:16px;height:16px}
.topbar-spacer{flex:1}
.hotkey-hint{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt-2)}
.kbd{font-family:Consolas,monospace;font-size:11px;padding:2px 6px;background:var(--bg-elev);border:1px solid var(--bd-2);border-radius:4px;color:var(--txt-1)}
.icon-btn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--txt-1);transition:all .15s}
.icon-btn:hover{background:var(--bg-hover);color:var(--txt-0)}
.icon-btn svg{width:18px;height:18px}

/* 主体三栏 */
.main{display:grid;grid-template-columns:1fr 300px;gap:14px;flex:1;min-height:0}

/* 画布区 */
.canvas-wrap{background:var(--bg-card);border:1px solid var(--bd);border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
.canvas-toolbar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.cb-group{display:flex;align-items:center;gap:4px}
.cb-label{font-size:12px;color:var(--txt-2);margin-right:4px}
.cb-btn{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:6px;font-size:12px;color:var(--txt-1);transition:all .15s}
.cb-btn:hover{background:var(--bg-hover);color:var(--txt-0)}
.cb-btn svg{width:14px;height:14px}
.cb-divider{width:1px;height:18px;background:var(--bd)}
.canvas-stage{flex:1;position:relative;background:
  linear-gradient(45deg,var(--bg-elev) 25%,transparent 25%),
  linear-gradient(-45deg,var(--bg-elev) 25%,transparent 25%),
  linear-gradient(45deg,transparent 75%,var(--bg-elev) 75%),
  linear-gradient(-45deg,transparent 75%,var(--bg-elev) 75%);
  background-size:24px 24px;background-position:0 0,0 12px,12px -12px,-12px 0;
  overflow:hidden;min-height:0}
/* 选区 */
.selection{position:absolute;left:18%;top:14%;width:52%;height:58%;border:1.5px solid var(--accent);box-shadow:0 0 0 9999px rgba(0,0,0,.45);cursor:move;transition:box-shadow .2s}
:root[data-theme="light"] .selection{box-shadow:0 0 0 9999px rgba(20,30,60,.32)}
.selection .dim{position:absolute;top:-26px;left:0;background:var(--accent);color:#fff;font-size:11px;font-family:Consolas,monospace;padding:3px 8px;border-radius:5px;white-space:nowrap}
.handle{position:absolute;width:11px;height:11px;background:#fff;border:1.5px solid var(--accent);border-radius:2px}
.handle.tl{top:-6px;left:-6px;cursor:nwse-resize}
.handle.tr{top:-6px;right:-6px;cursor:nesw-resize}
.handle.bl{bottom:-6px;left:-6px;cursor:nesw-resize}
.handle.br{bottom:-6px;right:-6px;cursor:nwse-resize}
.handle.tm{top:-6px;left:50%;transform:translateX(-50%);cursor:ns-resize}
.handle.bm{bottom:-6px;left:50%;transform:translateX(-50%);cursor:ns-resize}
.handle.lm{left:-6px;top:50%;transform:translateY(-50%);cursor:ew-resize}
.handle.rm{right:-6px;top:50%;transform:translateY(-50%);cursor:ew-resize}
/* 选区内标注示意 */
.sel-anno{position:absolute;inset:0;pointer-events:none}
.sel-anno .arr{stroke:var(--red);stroke-width:3;fill:none}
.sel-anno .hl{fill:var(--orange);opacity:.28}
.sel-anno .box{stroke:var(--accent);stroke-width:2.5;fill:none}
.sel-anno .txt-anno{position:absolute;background:var(--red);color:#fff;font-size:12px;padding:2px 6px;border-radius:3px;font-weight:500}

/* 悬浮标注工具栏 */
.float-toolbar{position:absolute;left:18%;top:calc(14% + 58% + 14px);display:flex;align-items:center;gap:2px;background:var(--bg-card);border:1px solid var(--bd-2);border-radius:12px;padding:6px;box-shadow:var(--shadow);z-index:10;transition:left .25s, top .25s}
.float-toolbar.fixed{left:auto;right:14px;top:60px;flex-direction:column;align-items:stretch;width:52px}
.tool{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--txt-1);transition:all .12s;position:relative}
.tool:hover{background:var(--bg-hover);color:var(--txt-0)}
.tool.active{background:var(--accent);color:#fff}
.tool svg{width:18px;height:18px}
.tool .tip{position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);background:var(--bg-elev);color:var(--txt-0);font-size:11px;padding:3px 8px;border-radius:5px;white-space:nowrap;opacity:0;pointer-events:none;border:1px solid var(--bd-2);transition:opacity .15s}
.tool:hover .tip{opacity:1}
.float-toolbar.fixed .tool .tip{left:50%;bottom:50%;transform:translate(40px,50%)}
.tb-divider{width:1px;height:24px;background:var(--bd);margin:0 3px}
.float-toolbar.fixed .tb-divider{width:24px;height:1px;margin:3px 0}

/* 颜色 + 粗细面板 */
.custom-panel{position:absolute;left:18%;top:calc(14% + 58% + 64px);background:var(--bg-card);border:1px solid var(--bd-2);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);z-index:9;display:none;min-width:300px}
.custom-panel.show{display:block}
.cp-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cp-row:last-child{margin-bottom:0}
.cp-label{font-size:12px;color:var(--txt-2);width:32px;flex-shrink:0}
.swatches{display:flex;gap:7px;flex-wrap:wrap}
.swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s}
.swatch:hover{transform:scale(1.12)}
.swatch.active{border-color:var(--txt-0);box-shadow:var(--ring)}
.swatch.custom{background:conic-gradient(#ff3b30,#ff9500,#ffcc02,#34c759,#30b0c7,#007aff,#5856d6,#af52de,#ff2d55,#ff3b30);position:relative}
.swatch.custom::after{content:"+";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600}
.thickness-row{display:flex;align-items:center;gap:14px;flex:1}
.th-opt{display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:background .12s}
.th-opt:hover{background:var(--bg-hover)}
.th-opt.active{background:var(--accent-bg)}
.th-dot{border-radius:50%;background:var(--txt-0)}
.th-opt.active .th-dot{background:var(--accent)}
.th-label{font-size:11px;color:var(--txt-2);font-family:Consolas,monospace}
.th-opt.active .th-label{color:var(--accent)}

/* 右侧面板 */
.side{display:flex;flex-direction:column;gap:14px;min-height:0}
.panel{background:var(--bg-card);border:1px solid var(--bd);border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--bd)}
.panel-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
.panel-title .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.panel-body{padding:14px;overflow-y:auto}

/* 预览 */
.preview-thumb{width:100%;aspect-ratio:16/9;border-radius:8px;border:1px solid var(--bd);background:
  linear-gradient(135deg,var(--bg-elev),var(--bg-input));display:flex;align-items:center;justify-content:center;color:var(--txt-3);font-size:12px;margin-bottom:12px;overflow:hidden;position:relative}
.preview-thumb svg{width:32px;height:32px;opacity:.5}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.meta-item{background:var(--bg-elev);border-radius:7px;padding:8px 10px}
.meta-k{font-size:11px;color:var(--txt-2)}
.meta-v{font-size:13px;font-weight:600;color:var(--txt-0);font-family:Consolas,monospace;margin-top:2px}
.action-row{display:flex;gap:8px;margin-top:12px}
.btn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-ghost{background:var(--bg-elev);color:var(--txt-1);border:1px solid var(--bd)}
.btn-ghost:hover{background:var(--bg-hover);color:var(--txt-0)}

/* 历史 */
.history-panel{flex:1;min-height:0}
.history-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hist-item{aspect-ratio:16/10;border-radius:7px;border:1px solid var(--bd);overflow:hidden;cursor:pointer;position:relative;transition:all .15s}
.hist-item:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.hist-item.active{border-color:var(--accent);box-shadow:var(--ring)}
.hist-thumb{width:100%;height:100%}
.hist-badge{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,.65);color:#fff;font-size:10px;padding:1px 5px;border-radius:3px;font-family:Consolas,monospace}
.hist-empty{grid-column:1/-1;text-align:center;color:var(--txt-3);font-size:12px;padding:20px}

/* 底部状态栏 */
.statusbar{display:flex;align-items:center;gap:18px;padding:0 4px;font-size:12px;color:var(--txt-2);flex-wrap:wrap}
.statusbar .sk{display:flex;align-items:center;gap:5px}
.statusbar .sk .kbd{font-size:10px}
.statusbar .spacer{flex:1}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg-elev);border:1px solid var(--bd-2);color:var(--txt-0);padding:10px 18px;border-radius:10px;box-shadow:var(--shadow);font-size:13px;opacity:0;pointer-events:none;transition:all .25s;z-index:100;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:16px;height:16px;color:var(--green)}

@media(max-width:980px){
  .main{grid-template-columns:1fr}
  .side{flex-direction:row;flex-wrap:wrap}
  .side .panel{flex:1;min-width:260px}
}
@media(max-width:640px){
  .app{padding:10px}
  .mode-tabs{order:3;width:100%;overflow-x:auto}
  .float-toolbar{flex-wrap:wrap;max-width:90%}
}
</style>
</head>
<body>
<div class="app">

  <!-- 顶栏 -->
  <header class="topbar">
    <div class="brand">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="8" y="8" width="8" height="8" rx="1"/></svg>
      </div>
      <span>截图工具</span>
      <span style="font-size:11px;color:var(--txt-2);font-weight:400">v4.0 设计预览</span>
    </div>

    <div class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" data-mode="region">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="8" y="8" width="8" height="8" rx="1"/></svg>
        区域截图
      </button>
      <button class="mode-tab" data-mode="fullscreen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        全屏截图
      </button>
      <button class="mode-tab" data-mode="window">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/><circle cx="6.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="9" cy="6.5" r=".5" fill="currentColor"/></svg>
        窗口截图
      </button>
      <button class="mode-tab" data-mode="scroll">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 7h8M8 11h8M8 15h5"/><path d="M12 19v2M10 21l2-2 2 2" stroke-width="1.8"/></svg>
        滚动截图
      </button>
    </div>

    <div class="topbar-spacer"></div>

    <div class="hotkey-hint">
      <span>截图</span>
      <span class="kbd">Ctrl</span><span>+</span><span class="kbd">Shift</span><span>+</span><span class="kbd">S</span>
    </div>

    <button class="icon-btn" id="themeToggle" title="切换主题">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="icon-btn" title="设置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>

  <!-- 主体 -->
  <div class="main">

    <!-- 画布 -->
    <div class="canvas-wrap">
      <div class="canvas-toolbar">
        <div class="cb-group">
          <span class="cb-label">选区</span>
          <button class="cb-btn" id="reselectBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/></svg>
            重选
          </button>
          <button class="cb-btn" id="centerBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2"/></svg>
            居中
          </button>
        </div>
        <div class="cb-divider"></div>
        <div class="cb-group">
          <span class="cb-label">微调</span>
          <button class="cb-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>+1px</button>
          <button class="cb-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14" stroke-linecap="round"/></svg>-1px</button>
          <span class="cb-label" style="margin-left:6px">方向键 ←↑↓→ 精确移动</span>
        </div>
        <div style="flex:1"></div>
        <div class="cb-group">
          <button class="cb-btn" id="toggleFixed">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5M9 10.76V6a2 2 0 0 1 2-2 2 2 0 0 1 2 2v4.76l2 3.24H7l2-3.24z"/></svg>
            <span id="fixedLabel">固定工具栏</span>
          </button>
        </div>
      </div>

      <div class="canvas-stage" id="stage">
        <!-- 选区 -->
        <div class="selection" id="selection">
          <div class="dim" id="dimLabel">960 × 540</div>
          <div class="handle tl"></div><div class="handle tr"></div>
          <div class="handle bl"></div><div class="handle br"></div>
          <div class="handle tm"></div><div class="handle bm"></div>
          <div class="handle lm"></div><div class="handle rm"></div>

          <!-- 标注示意 -->
          <svg class="sel-anno" viewBox="0 0 500 280" preserveAspectRatio="none">
            <rect class="hl" x="40" y="40" width="120" height="60" rx="4"/>
            <path class="box" d="M260 50 L420 50 L420 130 L260 130 Z"/>
            <path class="arr" d="M180 180 L320 120" marker-end="url(#ah)"/>
            <defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#e05555"/></marker></defs>
          </svg>
          <div class="sel-anno"><span class="txt-anno" style="left:62%;top:58%">重点</span></div>
        </div>

        <!-- 悬浮标注工具栏 -->
        <div class="float-toolbar" id="floatToolbar">
          <button class="tool active" data-tool="arrow" title="箭头 (A)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="13 5 19 5 19 11"/></svg>
            <span class="tip">箭头 · A</span>
          </button>
          <button class="tool" data-tool="rect" title="矩形 (R)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="6" width="16" height="12" rx="1"/></svg>
            <span class="tip">矩形 · R</span>
          </button>
          <button class="tool" data-tool="text" title="文字 (T)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V5h16v2M9 19h6M12 5v14"/></svg>
            <span class="tip">文字 · T</span>
          </button>
          <button class="tool" data-tool="mosaic" title="马赛克 (M)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="1"/><path d="M4 10h16M4 14h16M10 4v16M14 4v16" stroke-width="1.5"/></svg>
            <span class="tip">马赛克 · M</span>
          </button>
          <button class="tool" data-tool="highlight" title="高亮 (H)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l-4 4v4h4l4-4M13 7l4 4-7 7-4-4z"/></svg>
            <span class="tip">高亮 · H</span>
          </button>
          <button class="tool" data-tool="circle" title="椭圆 (O)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="8" ry="6"/></svg>
            <span class="tip">椭圆 · O</span>
          </button>
          <button class="tool" data-tool="pen" title="画笔 (P)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18z"/><path d="M2 2l7.586 7.586"/></svg>
            <span class="tip">画笔 · P</span>
          </button>
          <div class="tb-divider"></div>
          <button class="tool" data-tool="color" id="colorBtn" title="颜色与粗细 (C)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="10.5" r="2.5"/><circle cx="8.5" cy="7.5" r="2.5"/><circle cx="6.5" cy="12.5" r="2.5"/><path d="M12 22a10 10 0 1 1 0-20 8 8 0 0 1 0 16h-1.5a1.5 1.5 0 0 0 0 3z"/></svg>
            <span class="tip">颜色粗细 · C</span>
          </button>
          <div class="tb-divider"></div>
          <button class="tool" id="undoBtn" title="撤销 (Ctrl+Z)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6M3 13a9 9 0 1 0 3-7"/></svg>
            <span class="tip">撤销 · Ctrl+Z</span>
          </button>
          <button class="tool" id="redoBtn" title="重做 (Ctrl+Y)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6M21 13a9 9 0 1 1-3-7"/></svg>
            <span class="tip">重做 · Ctrl+Y</span>
          </button>
          <button class="tool" id="copyBtn" title="复制 (Ctrl+C)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span class="tip">复制 · Ctrl+C</span>
          </button>
          <div class="tb-divider"></div>
          <button class="tool" id="confirmBtn" title="确认 (Enter)" style="background:var(--accent);color:#fff">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span class="tip">确认 · Enter</span>
          </button>
        </div>

        <!-- 颜色粗细面板 -->
        <div class="custom-panel" id="customPanel">
          <div class="cp-row">
            <span class="cp-label">颜色</span>
            <div class="swatches" id="swatches"></div>
          </div>
          <div class="cp-row">
            <span class="cp-label">粗细</span>
            <div class="thickness-row" id="thicknessRow">
              <div class="th-opt" data-th="2"><span class="th-dot" style="width:4px;height:4px"></span><span class="th-label">2px</span></div>
              <div class="th-opt active" data-th="4"><span class="th-dot" style="width:7px;height:7px"></span><span class="th-label">4px</span></div>
              <div class="th-opt" data-th="6"><span class="th-dot" style="width:10px;height:10px"></span><span class="th-label">6px</span></div>
              <div class="th-opt" data-th="10"><span class="th-dot" style="width:13px;height:13px"></span><span class="th-label">10px</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 右侧 -->
    <aside class="side">
      <!-- 预览 -->
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title"><span class="dot"></span>预览与编辑</div>
          <span style="font-size:11px;color:var(--txt-2)">PNG · 960×540</span>
        </div>
        <div class="panel-body">
          <div class="preview-thumb">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
          </div>
          <div class="meta">
            <div class="meta-item"><div class="meta-k">尺寸</div><div class="meta-v">960×540</div></div>
            <div class="meta-item"><div class="meta-k">大小</div><div class="meta-v">128 KB</div></div>
            <div class="meta-item"><div class="meta-k">格式</div><div class="meta-v">PNG</div></div>
            <div class="meta-item"><div class="meta-k">缩放</div><div class="meta-v">100%</div></div>
          </div>
          <div class="action-row">
            <button class="btn btn-primary" id="saveBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              保存
            </button>
            <button class="btn btn-ghost" id="shareBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              分享
            </button>
          </div>
        </div>
      </div>

      <!-- 历史 -->
      <div class="panel history-panel">
        <div class="panel-head">
          <div class="panel-title"><span class="dot"></span>历史记录</div>
          <span style="font-size:11px;color:var(--txt-2)" id="histCount">共 6 张</span>
        </div>
        <div class="panel-body">
          <div class="history-grid" id="historyGrid"></div>
        </div>
      </div>
    </aside>
  </div>

  <!-- 状态栏 -->
  <footer class="statusbar">
    <div class="sk"><span>工具:</span><span class="kbd" id="curTool">箭头</span></div>
    <div class="sk"><span>颜色:</span><span id="curColor" style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#FF3B30;border:1px solid var(--bd-2)"></span></div>
    <div class="sk"><span>粗细:</span><span class="kbd" id="curTh">4px</span></div>
    <div class="spacer"></div>
    <div class="sk"><span class="kbd">A/R/T/M/H/O/P</span><span>切换工具</span></div>
    <div class="sk"><span class="kbd">C</span><span>颜色</span></div>
    <div class="sk"><span class="kbd">F</span><span>固定</span></div>
    <div class="sk"><span class="kbd">Esc</span><span>取消</span></div>
    <div class="sk"><span class="kbd">Enter</span><span>确认保存</span></div>
  </footer>
</div>

<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toastMsg">操作成功</span>
</div>

<script>
const COLORS=["#FF3B30","#FF6B35","#FF9500","#FFCC02","#34C759","#30B0C7","#007AFF","#5856D6","#AF52DE","#FF2D55","#8E8E93","#FFFFFF"];
const TOOL_NAMES={arrow:"箭头",rect:"矩形",text:"文字",mosaic:"马赛克",highlight:"高亮",circle:"椭圆",pen:"画笔"};
let state={tool:"arrow",color:"#FF3B30",thickness:4,fixed:false,panelOpen:false};

// 颜色色板
const sw=document.getElementById("swatches");
COLORS.forEach((c,i)=>{
  const el=document.createElement("div");
  el.className="swatch"+(i===0?" active":"");
  el.style.background=c;
  el.dataset.color=c;
  el.onclick=()=>{document.querySelectorAll(".swatch").forEach(s=>s.classList.remove("active"));el.classList.add("active");state.color=c;document.getElementById("curColor").style.background=c;};
  sw.appendChild(el);
});
const customSw=document.createElement("div");
customSw.className="swatch custom";
customSw.title="自定义取色";
customSw.onclick=()=>toast("打开系统取色器");
sw.appendChild(customSw);

// 厚度
document.querySelectorAll(".th-opt").forEach(o=>{
  o.onclick=()=>{
    document.querySelectorAll(".th-opt").forEach(x=>x.classList.remove("active"));
    o.classList.add("active");
    state.thickness=+o.dataset.th;
    document.getElementById("curTh").textContent=state.thickness+"px";
  };
});

// 工具切换
document.querySelectorAll(".tool[data-tool]").forEach(t=>{
  t.onclick=()=>{
    const tool=t.dataset.tool;
    if(tool==="color"){togglePanel();return;}
    document.querySelectorAll(".tool[data-tool]").forEach(x=>{if(x.dataset.tool!=="color")x.classList.remove("active");});
    t.classList.add("active");
    state.tool=tool;
    document.getElementById("curTool").textContent=TOOL_NAMES[tool]||tool;
    closePanel();
  };
});
function togglePanel(){const p=document.getElementById("customPanel");state.panelOpen=!state.panelOpen;p.classList.toggle("show",state.panelOpen);}
function closePanel(){state.panelOpen=false;document.getElementById("customPanel").classList.remove("show");}

// 模式切换
document.querySelectorAll(".mode-tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".mode-tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    toast("切换至 "+t.textContent.trim());
  };
});

// 主题
const root=document.documentElement;
document.getElementById("themeToggle").onclick=()=>{
  const cur=root.getAttribute("data-theme");
  const next=cur==="dark"?"light":"dark";
  root.setAttribute("data-theme",next);
  const icon=document.getElementById("themeIcon");
  if(next==="light"){icon.innerHTML='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';}
  else{icon.innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';}
};

// 固定/悬浮
document.getElementById("toggleFixed").onclick=toggleFixed;
function toggleFixed(){
  state.fixed=!state.fixed;
  const tb=document.getElementById("floatToolbar");
  tb.classList.toggle("fixed",state.fixed);
  document.getElementById("fixedLabel").textContent=state.fixed?"悬浮工具栏":"固定工具栏";
  toast(state.fixed?"工具栏已固定至右侧":"工具栏已恢复悬浮");
}

// 按钮
document.getElementById("saveBtn").onclick=()=>toast("已保存至 桌面 · 960×540.png");
document.getElementById("shareBtn").onclick=()=>toast("分享面板已展开");
document.getElementById("confirmBtn").onclick=()=>toast("截图已确认保存");
document.getElementById("undoBtn").onclick=()=>toast("已撤销");
document.getElementById("redoBtn").onclick=()=>toast("已重做");
document.getElementById("copyBtn").onclick=()=>toast("已复制到剪贴板");
document.getElementById("reselectBtn").onclick=()=>toast("请拖拽重新选择区域");
document.getElementById("centerBtn").onclick=()=>toast("选区已居中");

// 历史
const HIST=[
  {t:"15:42",c:"#4a8cff"},{t:"15:30",c:"#7f77dd"},{t:"14:58",c:"#34c759"},
  {t:"14:12",c:"#e09050"},{t:"13:05",c:"#e05555"},{t:"11:48",c:"#30b0c7"}
];
const hg=document.getElementById("historyGrid");
HIST.forEach((h,i)=>{
  const el=document.createElement("div");
  el.className="hist-item"+(i===0?" active":"");
  el.innerHTML=`<div class="hist-thumb" style="background:linear-gradient(135deg,${h.c},${h.c}88)"></div><span class="hist-badge">${h.t}</span>`;
  el.onclick=()=>{document.querySelectorAll(".hist-item").forEach(x=>x.classList.remove("active"));el.classList.add("active");toast("已加载历史截图 "+h.t);};
  hg.appendChild(el);
});

// 选区拖动
let drag=null;
const sel=document.getElementById("selection");
const stage=document.getElementById("stage");
sel.addEventListener("mousedown",e=>{
  if(e.target.classList.contains("handle"))return;
  const r=sel.getBoundingClientRect();
  drag={ox:e.clientX-r.left,oy:e.clientY-r.top};
  e.preventDefault();
});
document.addEventListener("mousemove",e=>{
  if(!drag)return;
  const sr=stage.getBoundingClientRect();
  let x=e.clientX-sr.left-drag.ox;
  let y=e.clientY-sr.top-drag.oy;
  x=Math.max(0,Math.min(x,sr.width-sel.offsetWidth));
  y=Math.max(0,Math.min(y,sr.height-sel.offsetHeight));
  sel.style.left=(x/sr.width*100)+"%";
  sel.style.top=(y/sr.height*100)+"%";
  const tb=document.getElementById("floatToolbar");
  if(!state.fixed){tb.style.left=(x/sr.width*100)+"%";tb.style.top=((y+sel.offsetHeight)/sr.height*100*0.9+4)+"%";}
});
document.addEventListener("mouseup",()=>drag=null);

// 尺寸更新
function updateDim(){
  const sr=stage.getBoundingClientRect();
  const w=Math.round(sel.offsetWidth/sr.width*1920);
  const h=Math.round(sel.offsetHeight/sr.height*1080);
  document.getElementById("dimLabel").textContent=w+" × "+h;
}
window.addEventListener("resize",updateDim);
setTimeout(updateDim,100);

// 快捷键
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT")return;
  const k=e.key.toLowerCase();
  const map={a:"arrow",r:"rect",t:"text",m:"mosaic",h:"highlight",o:"circle",p:"pen"};
  if(map[k]&&!e.ctrlKey&&!e.metaKey){
    const btn=document.querySelector(`.tool[data-tool="${map[k]}"]`);
    if(btn)btn.click();
  }
  if(k==="c"&&!e.ctrlKey&&!e.metaKey){togglePanel();}
  if(k==="f"&&!e.ctrlKey&&!e.metaKey){toggleFixed();}
  if(k==="escape"){closePanel();toast("已取消");}
  if(k==="enter"){document.getElementById("confirmBtn").click();}
});

// toast
let toastTimer;
function toast(msg){
  document.getElementById("toastMsg").textContent=msg;
  const t=document.getElementById("toast");
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),1800);
}
</script>
</body>
</html>
